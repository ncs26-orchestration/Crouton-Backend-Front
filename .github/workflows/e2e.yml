name: e2e

# Boots the real stack with docker compose (Postgres + Redis + auto-migrate +
# Go API + Python agent), waits for healthchecks, and runs a smoke test against
# the live services. Catches breakage the per-app jobs can't: a broken
# Dockerfile, a service that won't boot, a migration that won't auto-apply, or a
# cross-service regression.

on:
  push:
    branches: [main, develop]
  pull_request:
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: stack smoke (compose up --wait)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: prepare env
        run: cp .env.example .env

      - name: build + boot backend slice
        # Web is validated by the `web` CI job; here we boot the services the
        # backend integration depends on. `--wait` blocks until healthchecks
        # pass and the one-shot migrate completes.
        run: docker compose up -d --build --wait postgres redis migrate api agent

      - name: smoke test
        run: bash scripts/e2e-smoke.sh

      - name: dump logs on failure
        if: failure()
        run: docker compose logs --no-color --tail 400

      - name: teardown
        if: always()
        run: docker compose down -v --remove-orphans
