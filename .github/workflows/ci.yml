name: ci

on:
  pull_request:
  push:
    branches-ignore:
      - main # main is built and deployed by deploy.yml

# Least privilege: CI only reads the repo.
permissions:
  contents: read

jobs:
  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.25"
          cache-dependency-path: apps/api/go.sum
      - run: go vet ./...
      - run: go build ./...
      - run: go test ./...

  sqlc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: sqlc-dev/setup-sqlc@c0209b9199cd1cce6a14fc27cabcec491b651761 # v4
        with:
          sqlc-version: "1.30.0"
      - name: Verify generated code is up to date
        run: sqlc diff

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: "9.15.0"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "26"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web build

  docker:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { name: api, context: apps/api, file: apps/api/Dockerfile }
          - { name: web, context: ., file: apps/web/Dockerfile }
          - { name: migrate, context: db, file: db/Dockerfile }
          - { name: nginx, context: deploy/nginx, file: deploy/nginx/Dockerfile }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Build ${{ matrix.name }} image (no push)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: false
