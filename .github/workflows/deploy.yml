name: deploy

on:
  push:
    branches: [main]

# Never run two deploys at once; let an in-flight deploy finish.
concurrency:
  group: deploy-main
  cancel-in-progress: false

# Least privilege: read the repo and mint a WIF token. Nothing else.
permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    strategy:
      matrix:
        include:
          - { name: api, context: apps/api, file: apps/api/Dockerfile }
          - { name: web, context: ., file: apps/web/Dockerfile }
          - { name: migrate, context: db, file: db/Dockerfile }
          - { name: nginx, context: deploy/nginx, file: deploy/nginx/Dockerfile }
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - id: auth
        uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SA }}
          token_format: access_token
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ vars.GCP_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          push: true
          provenance: true
          sbom: true
          tags: |
            ${{ vars.REGISTRY }}/${{ matrix.name }}:${{ github.sha }}
            ${{ vars.REGISTRY }}/${{ matrix.name }}:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: google-github-actions/auth@c200f3691d83b41bf9bbd8638997a462592937ed # v2
        with:
          workload_identity_provider: ${{ vars.WIF_PROVIDER }}
          service_account: ${{ vars.DEPLOY_SA }}
      - uses: google-github-actions/setup-gcloud@e427ad8a34f8676edf47cf7d7925499adf3eb74f # v2
      - name: Upload compose file and deploy script to VM
        run: |
          gcloud compute scp deploy/docker-compose.yml deploy/remote-deploy.sh \
            "${{ vars.VM_NAME }}:/tmp/" \
            --zone="${{ vars.VM_ZONE }}" --tunnel-through-iap
      - name: Pull images, migrate, restart
        env:
          SHA: ${{ github.sha }}
        run: |
          gcloud compute ssh "${{ vars.VM_NAME }}" \
            --zone="${{ vars.VM_ZONE }}" --tunnel-through-iap \
            --command="sudo mkdir -p /opt/app && sudo mv /tmp/docker-compose.yml /opt/app/docker-compose.yml && sudo bash /tmp/remote-deploy.sh ${SHA}"
      - name: Smoke test
        run: |
          for i in $(seq 1 24); do
            if curl -fsS "http://${{ vars.VM_IP }}/api/health"; then
              echo; echo "healthy"; exit 0
            fi
            echo "waiting for app... ($i)"; sleep 5
          done
          echo "health check failed"; exit 1
