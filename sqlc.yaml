version: "2"
sql:
  - engine: "postgresql"
    schema: "db/migrations"
    queries: "db/queries"
    gen:
      go:
        package: "db"
        out: "apps/api/internal/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        json_tags_case_style: "snake"
        overrides:
          - db_type: "timestamptz"
            go_type: "time.Time"
