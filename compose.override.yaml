services:
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  # Elsa Server 3 (dev only). Gives us a live target for
  # /chats/:id/deploy with kind=elsa3 → POST /elsa/api/workflow-definitions.
  # The public image bundles Elsa Studio UI at / and the REST API under
  # /elsa/api/*. We run it in "no-auth" mode for dev so curl round-trips
  # work without minting API keys — switch to ApiKey/Bearer in prod by
  # setting Identity__ApiKey and registering an apikey deploy target.
  elsa3:
    image: elsaworkflows/elsa-server-and-studio-v3:latest
    restart: unless-stopped
    environment:
      # Elsa reads its own SQLite db inside the container by default,
      # fine for dev. No external Postgres needed.
      ASPNETCORE_URLS: "http://+:8080"
      # Allow the Studio UI to call the server on the same origin.
      ASPNETCORE_ENVIRONMENT: "Development"
    ports:
      - "8280:8080"
    # The aspnet image ships neither curl nor wget, so probe the
    # listener via bash's /dev/tcp. Confirms the Kestrel server has
    # bound port 8080 — good enough as a liveness signal.
    healthcheck:
      test: ["CMD-SHELL", "timeout 3 bash -c '</dev/tcp/localhost/8080' 2>/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks: [aup]

  # One-shot migration runner. Reuses the api dev image (which bundles
  # dbmate) to apply all pending migrations before the api boots, so a
  # fresh `docker compose up` lands on a fully migrated schema with no
  # manual `make migrate-up` step. `--wait` blocks until Postgres
  # accepts connections; the healthcheck gate already covers that, but
  # it makes the service robust if run on its own.
  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: dev
    # --no-dump-schema: the alpine build has no pg_dump, and the post-up
    # schema dump would otherwise fail the one-shot and block the api.
    command: ["dbmate", "--migrations-dir", "/app/migrations", "--no-dump-schema", "--wait", "up"]
    working_dir: /app
    volumes:
      - ./apps/api:/app
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://app:app@postgres:5432/app?sslmode=disable}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks: [aup]

  api:
    build:
      target: dev
    command: ["air", "-c", ".air.toml"]
    volumes:
      - ./apps/api:/app
      - go_mod_cache:/go/pkg/mod
      - api_tmp:/app/tmp
    working_dir: /app
    ports:
      - "8080:8080"
    environment:
      APP_ENV: development
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s

  agent:
    build:
      target: dev
    command:
      ["uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    volumes:
      - ./apps/agent:/app
      - agent_venv:/app/.venv
      # Persist downloaded Whisper models across container recreates.
      # First call after a fresh volume downloads ~150 MB for the
      # `base` model; cached forever after.
      - whisper_cache:/app/.whisper-cache
    working_dir: /app
    ports:
      - "8000:8000"
    # host.docker.internal needs to be explicit on Linux hosts;
    # Docker Desktop (Mac/Windows) already maps it, but the extra
    # mapping is a no-op there.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      APP_ENV: development
      DATABASE_URL: ${DATABASE_URL:-postgres://app:app@postgres:5432/app?sslmode=disable}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      AGENT_EXTRACTOR_PROVIDER: ${AGENT_EXTRACTOR_PROVIDER:-ollama}
      AGENT_EXTRACTOR_MODEL: ${AGENT_EXTRACTOR_MODEL:-qwen2.5:7b}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # python:slim ships no curl/wget, so probe the health endpoint with
    # the interpreter that's already on PATH.
    healthcheck:
      test:
        - CMD-SHELL
        - python3 -c "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz').status==200 else 1)" || exit 1
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 60s

  web:
    image: node:24-alpine
    command:
      - sh
      - -c
      - |
        apk add --no-cache nodejs npm
        npm install -g pnpm@10.33.0 --silent
        pnpm install --prefer-offline
        pnpm --filter web dev --host
    working_dir: /repo
    volumes:
      - ./:/repo
      - web_node_modules:/repo/node_modules
      - web_pnpm_store:/root/.local/share/pnpm
    ports:
      - "5173:5173"
    environment:
      API_URL: http://api:8080
      AGENT_URL: http://agent:8000
    depends_on:
      api:
        condition: service_healthy
      agent:
        condition: service_healthy

volumes:
  go_mod_cache:
  api_tmp:
  agent_venv:
  whisper_cache:
  web_node_modules:
  web_pnpm_store:
