# Local development / full-stack smoke test. Builds images from source and
# brings up the same nginx -> web/api -> postgres topology as production.
# Browse http://localhost:8080
#
# Production uses deploy/docker-compose.yml (images from Artifact Registry).

name: ncs26-dev

x-db-url: &db_url
  DATABASE_URL: "postgres://app:app@postgres:5432/app?sslmode=disable"

services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "55432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [internal]

  migrate:
    build:
      context: ./db
    environment:
      <<: *db_url
      DBMATE_MIGRATIONS_DIR: /db/migrations
      DBMATE_NO_DUMP_SCHEMA: "true"
    command: ["up"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"
    networks: [internal]

  api:
    build:
      context: ./apps/api
    environment:
      <<: *db_url
      APP_ENV: development
      PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks: [internal]

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      PORT: "3000"
    networks: [internal]

  nginx:
    build:
      context: ./deploy/nginx
    ports:
      - "8088:80"
    depends_on:
      - api
      - web
    networks: [internal]

volumes:
  pgdata:

networks:
  internal:
