<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pablo · Architecture</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-paper:   #ffffff;
      --color-ink:     #061b31;
      --color-muted:   #64748d;
      --color-soft:    #94a3b8;
      --color-accent:  #533afd;
      --color-link:    #2874ad;
      --font-sans:     'Geist', system-ui, sans-serif;
      --font-serif:    'Instrument Serif', serif;
      --font-mono:     'Geist Mono', ui-monospace, monospace;
    }
    body {
      font-family: var(--font-sans);
      background: var(--color-paper);
      color: var(--color-ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }
    .frame { max-width: 1200px; width: 100%; }
    .eyebrow {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 0.5rem;
    }
    h1 {
      font-family: var(--font-serif);
      font-size: clamp(1.5rem, 2.4vw + 0.75rem, 2rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--color-ink);
      margin-bottom: 0.5rem;
    }
    .subtitle {
      font-family: var(--font-sans);
      font-size: 0.9rem;
      color: var(--color-muted);
      margin-bottom: 1.75rem;
      max-width: 640px;
    }
    svg { width: 100%; min-width: 900px; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Architecture · Pablo</p>
    <h1>Services, stores, and target engines</h1>
    <p class="subtitle">Three independent services. The agent extracts workflows from unstructured input. The API compiles and deploys. The engine runs.</p>

    <svg viewBox="0 0 1000 540" xmlns="http://www.w3.org/2000/svg">
      <defs>

        <marker id="arrow-link" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2874ad"/></marker>
      </defs>

      <rect width="100%" height="100%" fill="#ffffff"/>

      <!-- ===== Arrows first (z-order) ===== -->

      <line x1="160" y1="272" x2="200" y2="272" stroke="#2874ad" stroke-width="1.2" marker-end="url(#arrow-link)"/>
      <!-- Web → API (REST) -->
      <line x1="340" y1="272" x2="380" y2="272" stroke="#2874ad" stroke-width="1.2" marker-end="url(#arrow-link)"/>
      <!-- API → Agent (EXTRACT) — PRIMARY / ACCENT -->
      <line x1="520" y1="272" x2="580" y2="272" stroke="#533afd" stroke-width="1.4" marker-end="url(#arrow-accent)"/>
      <!-- Agent → Ollama (LLM) -->
      <line x1="676" y1="244" x2="808" y2="180" stroke="#2874ad" stroke-width="1.2" marker-end="url(#arrow-link)"/>
      <!-- API → Postgres (pgx) -->
      <line x1="440" y1="304" x2="440" y2="400" stroke="#64748d" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- API → Engines (HTTP deploy) -->
      <line x1="500" y1="304" x2="636" y2="400" stroke="#2874ad" stroke-width="1.2" marker-end="url(#arrow-link)"/>

      <!-- ===== Arrow labels (with opaque mask) ===== -->

      <rect x="156" y="252" width="48" height="12" rx="2" fill="#ffffff"/>
      <text x="180" y="262" fill="#2874ad" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">HTTPS</text>

      <rect x="336" y="252" width="48" height="12" rx="2" fill="#ffffff"/>
      <text x="360" y="262" fill="#2874ad" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">REST</text>

      <rect x="516" y="252" width="56" height="12" rx="2" fill="#ffffff"/>

      <text x="440" y="350" fill="#64748d" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">PGX</text>

      <text x="568" y="350" fill="#2874ad" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">DEPLOY</text>

      <text x="100" y="296" fill="#64748d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">chat · PDF · text</text>

      <!-- apps/web (backend) -->
      <rect x="200" y="240" width="140" height="64" rx="6" fill="#ffffff"/>
      <rect x="200" y="240" width="140" height="64" rx="6" fill="#ffffff" stroke="#061b31" stroke-width="1"/>
      <rect x="208" y="248" width="24" height="12" rx="2" fill="transparent" stroke="rgba(6,27,49,0.40)" stroke-width="0.8"/>

      <text x="660" y="296" fill="#64748d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">FastAPI · LangGraph</text>

      <!-- Ollama (external) -->
      <rect x="808" y="148" width="152" height="64" rx="6" fill="#ffffff"/>
      <rect x="808" y="148" width="152" height="64" rx="6" fill="rgba(6,27,49,0.03)" stroke="rgba(6,27,49,0.30)" stroke-width="1"/>
      <rect x="816" y="156" width="28" height="12" rx="2" fill="transparent" stroke="rgba(6,27,49,0.30)" stroke-width="0.8"/>
      <text x="830" y="165" fill="#64748d" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">LLM</text>

      <rect x="360" y="400" width="160" height="64" rx="6" fill="#ffffff"/>

      <rect x="368" y="408" width="24" height="12" rx="2" fill="transparent" stroke="rgba(100,116,141,0.60)" stroke-width="0.8"/>
      <text x="380" y="417" fill="#64748d" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">DB</text>
      <text x="440" y="440" fill="#061b31" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Postgres</text>
      <text x="440" y="456" fill="#64748d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">projects · chats · versions</text>

      <!-- Target engines (external) -->
      <rect x="560" y="400" width="200" height="64" rx="6" fill="#ffffff"/>
      <rect x="560" y="400" width="200" height="64" rx="6" fill="rgba(6,27,49,0.03)" stroke="rgba(6,27,49,0.30)" stroke-width="1"/>

      <text x="582" y="417" fill="#64748d" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">ENG</text>

      <text x="660" y="456" fill="#64748d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">Elsa 3 · Camunda 7</text>

      <line x1="748" y1="530" x2="776" y2="530" stroke="#2874ad" stroke-width="1.2" marker-end="url(#arrow-link)"/>
      <text x="784" y="532" fill="#64748d" font-size="8.5" font-family="'Geist', sans-serif">HTTP / external</text>

  </div>
</body>
</html>
