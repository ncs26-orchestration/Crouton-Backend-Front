<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pablo · User flow</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-paper:   #ffffff;
      --color-ink:     #061b31;
      --color-muted:   #64748d;
      --color-soft:    #94a3b8;
      --color-accent:  #533afd;
      --color-link:    #2874ad;
      --font-sans:     'Geist', system-ui, sans-serif;
      --font-serif:    'Instrument Serif', serif;
      --font-mono:     'Geist Mono', ui-monospace, monospace;
    }
    body {
      font-family: var(--font-sans);
      background: var(--color-paper);
      color: var(--color-ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }
    .frame { max-width: 1200px; width: 100%; }
    .eyebrow {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 0.5rem;
    }
    h1 {
      font-family: var(--font-serif);
      font-size: clamp(1.5rem, 2.4vw + 0.75rem, 2rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      color: var(--color-ink);
      margin-bottom: 0.5rem;
    }
    .subtitle {
      font-family: var(--font-sans);
      font-size: 0.9rem;
      color: var(--color-muted);
      margin-bottom: 1.75rem;
      max-width: 640px;
    }
    svg { width: 100%; min-width: 900px; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Flowchart · Pablo</p>
    <h1>From unstructured input to a live workflow</h1>
    <p class="subtitle">One chat thread per process. The copilot loop closes low-confidence items before the operator approves; everything after approval is deterministic.</p>

    <svg viewBox="0 0 1000 880" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#64748d"/></marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#533afd"/></marker>
        <marker id="arrow-link" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#2874ad"/></marker>
      </defs>

      <rect width="100%" height="100%" fill="#ffffff"/>

      <!-- ===== Arrows first ===== -->

      <!-- Start → Extract -->
      <line x1="500" y1="80" x2="500" y2="120" stroke="#64748d" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- Extract → Diamond -->
      <line x1="500" y1="184" x2="500" y2="240" stroke="#64748d" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- Diamond YES → Copilot (right) -->
      <line x1="580" y1="280" x2="680" y2="280" stroke="#64748d" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- Copilot loop back to Diamond top (L-path, dashed return) -->
      <path d="M 800 248 L 800 208 L 500 208 L 500 232" fill="none" stroke="#64748d" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
      <!-- Diamond NO → Approve (happy path) -->
      <line x1="500" y1="320" x2="500" y2="360" stroke="#64748d" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- Approve → Compile -->
      <line x1="500" y1="424" x2="500" y2="480" stroke="#64748d" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- Compile → Deploy -->
      <line x1="500" y1="544" x2="500" y2="600" stroke="#64748d" stroke-width="1.2" marker-end="url(#arrow)"/>
      <!-- Deploy → End -->
      <line x1="500" y1="664" x2="500" y2="720" stroke="#64748d" stroke-width="1.2" marker-end="url(#arrow)"/>

      <!-- ===== Arrow labels ===== -->

      <rect x="584" y="272" width="36" height="12" rx="2" fill="#ffffff"/>
      <text x="602" y="282" fill="#64748d" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">YES</text>

      <rect x="644" y="200" width="72" height="12" rx="2" fill="#ffffff"/>
      <text x="680" y="210" fill="#64748d" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">APPLY PATCH</text>

      <rect x="508" y="328" width="28" height="12" rx="2" fill="#ffffff"/>
      <text x="522" y="338" fill="#64748d" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">NO</text>

      <!-- ===== Shapes ===== -->

      <!-- 1. Start oval -->
      <rect x="400" y="40" width="200" height="40" rx="20" fill="#ffffff"/>
      <rect x="400" y="40" width="200" height="40" rx="20" fill="rgba(100,116,141,0.10)" stroke="#94a3b8" stroke-width="1"/>
      <text x="500" y="65" fill="#061b31" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">User sends message</text>

      <!-- 2. Extract step (FOCAL) -->
      <rect x="380" y="120" width="240" height="64" rx="6" fill="#ffffff"/>
      <rect x="380" y="120" width="240" height="64" rx="6" fill="rgba(83,58,253,0.08)" stroke="#533afd" stroke-width="1"/>
      <rect x="388" y="128" width="44" height="12" rx="2" fill="transparent" stroke="rgba(83,58,253,0.50)" stroke-width="0.8"/>
      <text x="410" y="137" fill="#533afd" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">EXTRACT</text>
      <text x="500" y="160" fill="#061b31" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Agent extracts IR</text>
      <text x="500" y="176" fill="#64748d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">Ollama qwen3.5:9b → IR JSON</text>

      <!-- 3. Diamond -->
      <polygon points="500,236 580,280 500,324 420,280" fill="#ffffff" stroke="#061b31" stroke-width="1"/>
      <text x="500" y="276" fill="#061b31" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Low-confidence</text>
      <text x="500" y="292" fill="#061b31" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">items?</text>

      <!-- 4. Copilot step (side branch) -->
      <rect x="680" y="248" width="240" height="64" rx="6" fill="#ffffff"/>
      <rect x="680" y="248" width="240" height="64" rx="6" fill="#ffffff" stroke="#061b31" stroke-width="1"/>
      <rect x="688" y="256" width="40" height="12" rx="2" fill="transparent" stroke="rgba(6,27,49,0.40)" stroke-width="0.8"/>
      <text x="708" y="265" fill="#061b31" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">COPILOT</text>
      <text x="800" y="288" fill="#061b31" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Clarify proposal</text>
      <text x="800" y="304" fill="#64748d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">JSON-Patch · accept / reject</text>

      <!-- 5. Approve step -->
      <rect x="380" y="360" width="240" height="64" rx="6" fill="#ffffff"/>
      <rect x="380" y="360" width="240" height="64" rx="6" fill="#ffffff" stroke="#061b31" stroke-width="1"/>
      <rect x="388" y="368" width="48" height="12" rx="2" fill="transparent" stroke="rgba(6,27,49,0.40)" stroke-width="0.8"/>
      <text x="412" y="377" fill="#061b31" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">APPROVE</text>
      <text x="500" y="400" fill="#061b31" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Operator approves</text>
      <text x="500" y="416" fill="#64748d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">workflow_version.stage → approved</text>

      <!-- 6. Compile step -->
      <rect x="380" y="480" width="240" height="64" rx="6" fill="#ffffff"/>
      <rect x="380" y="480" width="240" height="64" rx="6" fill="#ffffff" stroke="#061b31" stroke-width="1"/>
      <rect x="388" y="488" width="44" height="12" rx="2" fill="transparent" stroke="rgba(6,27,49,0.40)" stroke-width="0.8"/>
      <text x="410" y="497" fill="#061b31" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">COMPILE</text>
      <text x="500" y="520" fill="#061b31" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Compile via adapter</text>
      <text x="500" y="536" fill="#64748d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">ProcessIR → ExecutableIR → artifact</text>

      <!-- 7. Deploy step -->
      <rect x="380" y="600" width="240" height="64" rx="6" fill="#ffffff"/>
      <rect x="380" y="600" width="240" height="64" rx="6" fill="#ffffff" stroke="#061b31" stroke-width="1"/>
      <rect x="388" y="608" width="40" height="12" rx="2" fill="transparent" stroke="rgba(6,27,49,0.40)" stroke-width="0.8"/>
      <text x="408" y="617" fill="#061b31" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">DEPLOY</text>
      <text x="500" y="640" fill="#061b31" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Deploy to engine</text>
      <text x="500" y="656" fill="#64748d" font-size="9" font-family="'Geist Mono', monospace" text-anchor="middle">POST /workflow-definitions</text>

      <!-- 8. End oval -->
      <rect x="400" y="720" width="200" height="40" rx="20" fill="#ffffff"/>
      <rect x="400" y="720" width="200" height="40" rx="20" fill="rgba(100,116,141,0.10)" stroke="#94a3b8" stroke-width="1"/>
      <text x="500" y="745" fill="#061b31" font-size="12" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Workflow live on engine</text>

      <!-- ===== Legend ===== -->
      <line x1="40" y1="796" x2="960" y2="796" stroke="rgba(6,27,49,0.10)" stroke-width="0.8"/>
      <text x="40" y="812" fill="#64748d" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.18em">LEGEND</text>

      <rect x="40" y="828" width="40" height="10" rx="5" fill="rgba(100,116,141,0.10)" stroke="#94a3b8" stroke-width="1"/>
      <text x="88" y="836" fill="#64748d" font-size="8.5" font-family="'Geist', sans-serif">Start / end</text>

      <rect x="180" y="828" width="14" height="10" rx="2" fill="rgba(83,58,253,0.08)" stroke="#533afd" stroke-width="1"/>
      <text x="200" y="836" fill="#64748d" font-size="8.5" font-family="'Geist', sans-serif">Focal step</text>

      <rect x="292" y="828" width="14" height="10" rx="2" fill="#ffffff" stroke="#061b31" stroke-width="1"/>
      <text x="312" y="836" fill="#64748d" font-size="8.5" font-family="'Geist', sans-serif">Step</text>

      <polygon points="400,828 410,833 400,838 390,833" fill="#ffffff" stroke="#061b31" stroke-width="1"/>
      <text x="420" y="836" fill="#64748d" font-size="8.5" font-family="'Geist', sans-serif">Decision</text>

      <line x1="496" y1="833" x2="524" y2="833" stroke="#64748d" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
      <text x="532" y="836" fill="#64748d" font-size="8.5" font-family="'Geist', sans-serif">Loop / return</text>
    </svg>
  </div>
</body>
</html>
