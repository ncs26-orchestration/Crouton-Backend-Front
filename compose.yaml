name: aios

services:
  postgres:
    image: pgvector/pgvector:pg18
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-app}
    volumes:
      - pg_data:/var/lib/postgresql
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/00-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-app}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [aios]

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: ["redis-server", "/usr/local/etc/redis/redis.conf"]
    volumes:
      - redis_data:/data
      - ./infra/redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [aios]

  # Camunda 7 Run distribution — ships with the invoice demo data, so
  # users (demo/john/mary/peter) and groups (sales/accounting/management
  # /camunda-admin) exist the moment the container is healthy. AIOS never
  # writes identities into Camunda; it only reads them read-only via
  # /engine-rest and references those ids in compiled BPMN.
  camunda7:
    image: camunda/camunda-bpm-platform:run-latest
    restart: unless-stopped
    ports:
      - "8180:8080"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/engine-rest/engine"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks: [aios]

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: runtime
    restart: unless-stopped
    environment:
      PORT: "8080"
      DATABASE_URL: ${DATABASE_URL:-postgres://app:app@postgres:5432/app?sslmode=disable}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      AGENT_URL: ${AGENT_URL:-http://agent:8000}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      APP_ENV: ${APP_ENV:-production}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [aios]

  agent:
    build:
      context: .
      dockerfile: apps/agent/Dockerfile
      target: runtime
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://app:app@postgres:5432/app?sslmode=disable}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      # DeepSeek drives the per-request department reasoning. Without this the
      # agents fall back to deterministic logic, so it must reach the container.
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-flash}
      AGENT_DEFAULT_MODEL: ${AGENT_DEFAULT_MODEL:-}
      AGENT_LLM_TIMEOUT_SECONDS: ${AGENT_LLM_TIMEOUT_SECONDS:-25}
      AGENT_EXTRACTOR_PROVIDER: ${AGENT_EXTRACTOR_PROVIDER:-ollama}
      AGENT_EXTRACTOR_MODEL: ${AGENT_EXTRACTOR_MODEL:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      APP_ENV: ${APP_ENV:-production}
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    networks: [aios]

  simulator:
    build:
      context: apps/simulator
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgres://app:app@postgres:5432/app?sslmode=disable}
      API_URL: ${API_URL:-http://api:8080}
      INTERVAL: ${SIMULATOR_INTERVAL:-15s}
      ERROR_PROBABILITY: ${SIMULATOR_ERROR_PROB:-0.08}
    depends_on:
      postgres: { condition: service_healthy }
      api: { condition: service_started }
    networks: [aios]

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: runtime
    restart: unless-stopped
    depends_on:
      - api
      - agent
    networks: [aios]

volumes:
  pg_data:
  redis_data:

networks:
  aios:
    driver: bridge
