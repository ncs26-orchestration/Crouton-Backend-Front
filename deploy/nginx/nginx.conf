# Reverse proxy: /api/* -> Go/Echo backend, everything else -> TanStack SSR.
# Loaded into the http context via /etc/nginx/conf.d/default.conf.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream api_backend {
    server api:8080;
}

upstream web_frontend {
    server web:3000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    gzip on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/javascript application/xml image/svg+xml;

    # Backend API. The /api prefix is preserved (Echo routes are under /api).
    location /api/ {
        proxy_pass http://api_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Everything else goes to the TanStack Start Node server (SSR + assets).
    location / {
        proxy_pass http://web_frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# TLS server block goes here once a domain + Let's Encrypt cert are configured.
